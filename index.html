<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAND X</title>
    <meta name="description" content="BRAND X terminal interface. OBEY. CONSUME.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="crt-housing">
        <div class="screen-container">
            <!-- Header -->
            <header class="mb-10">
                <div class="terminal-text text-center">
                    <div class="logo-box">
                        <h1>BRAND X</h1>
                    </div>
                </div>
            </header>
            
            <!-- Main Content Grid -->
            <main class="terminal-grid">
                <!-- Left Box - PROJECTS -->
                <div class="terminal-box box-projects">
                    <h2 class="terminal-text">PROJECTS</h2>
                    <div class="box-content">
                        <ul id="projects-list" class="project-list"></ul>
                    </div>
                </div>
                
                <!-- Top Right Box - GITHUB -->
                <div class="terminal-box box-github">
                    <h2 class="terminal-text">GITHUB</h2>
                    <div class="box-content">
                        <a href="" id="github-link" class="raw-link terminal-text"></a>
                    </div>
                </div>
                
                <!-- Bottom Right Box - CONTACT -->
                <div class="terminal-box box-contact">
                    <h2 class="terminal-text">CONTACT</h2>
                    <div class="box-content">
                        <div id="contact-info" class="contact-info terminal-text">heyyo@lovethatbrandx.site</div>
                    </div>
                </div>
            </main>
            
            <!-- Footer -->
            <footer class="terminal-footer terminal-text">
                <p>&copy; 2026 BRAND X - OBEY. CONSUME.</p>
            </footer>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/script.js"></script>
</body>
</html>
